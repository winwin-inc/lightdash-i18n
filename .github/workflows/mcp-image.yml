name: Build & Deploy MCP Image

on:
    workflow_dispatch:
    push:
        tags:
            - 'mcp-v*'

env:
    REGISTRY: registry.cn-hangzhou.aliyuncs.com
    REGISTRY_IMAGE: registry.cn-hangzhou.aliyuncs.com/winwin/lightdash-mcp

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Resolve image tag
              id: vars
              shell: bash
              run: |
                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    TAG="${GITHUB_REF_NAME#mcp-v}"
                  else
                    TAG="sha-${GITHUB_SHA::12}"
                  fi
                  echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Aliyun Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.ALIYUN_REGISTRY_USER }}
                  password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

            - name: Build and push MCP image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: packages/lightdash-mcp/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  tags: |
                      ${{ env.REGISTRY_IMAGE }}:${{ steps.vars.outputs.tag }}
                      ${{ env.REGISTRY_IMAGE }}:latest
                  labels: |
                      org.opencontainers.image.title=lightdash-mcp
                      org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
                      org.opencontainers.image.revision=${{ github.sha }}
