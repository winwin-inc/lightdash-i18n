name: Build & Deploy to ALIYUN - MCP

on:
    workflow_dispatch:
    push:
        tags:
            - 'mcp-v*'

env:
    REGISTRY: registry.cn-hangzhou.aliyuncs.com
    # 与主应用镜像 winwin/lightdash 分离；需在 ACR 预先创建仓库 winwin/lightdash-mcp
    REGISTRY_IMAGE: registry.cn-hangzhou.aliyuncs.com/winwin/lightdash-mcp

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Resolve image tags
              id: vars
              shell: bash
              env:
                  REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
              run: |
                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    VERSION="${GITHUB_REF_NAME#mcp-v}"
                    if [[ -z "${VERSION}" ]]; then
                      echo "Invalid tag: expected mcp-vX.Y.Z, got ${GITHUB_REF_NAME}"
                      exit 1
                    fi
                    {
                      echo "tags<<EOF"
                      echo "${REGISTRY_IMAGE}:${VERSION}"
                      echo "${REGISTRY_IMAGE}:latest"
                      echo "EOF"
                    } >> "${GITHUB_OUTPUT}"
                    echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
                  else
                    VERSION="sha-${GITHUB_SHA::12}"
                    {
                      echo "tags<<EOF"
                      echo "${REGISTRY_IMAGE}:${VERSION}"
                      echo "EOF"
                    } >> "${GITHUB_OUTPUT}"
                    echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
                  fi

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Aliyun Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.ALIYUN_REGISTRY_USER }}
                  password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

            - name: Build and push MCP image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: packages/lightdash-mcp/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  tags: ${{ steps.vars.outputs.tags }}
                  labels: |
                      org.opencontainers.image.title=lightdash-mcp
                      org.opencontainers.image.version=${{ steps.vars.outputs.version }}
                      org.opencontainers.image.revision=${{ github.sha }}
